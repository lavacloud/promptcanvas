<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PromptCanvas</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ec;--bg2:#ece8df;--bg3:#e2ddd2;
  --sf:#fff;--sf2:#f8f6f1;
  --bd:#d8d2c4;--bd2:#c6bfae;
  --tx:#1c1916;--tx2:#5a5449;--tx3:#9a9285;--ink:#28221c;
  --am:#b57232;--am2:#985f28;--amg:rgba(181,114,50,.1);
  --gr:#476e41;--grg:rgba(71,110,65,.1);
  --bl:#265fa0;--blg:rgba(38,95,160,.1);
  --re:#be3030;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 2px 12px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.09);
  --serif:'Lora',serif;--mono:'JetBrains Mono',monospace;
  --sb-w:220px; --main-w:400px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--serif);color:var(--tx)}

/* ── TOOLBAR ── */
#bar{
  position:fixed;top:0;left:0;right:0;height:44px;z-index:9999;
  background:rgba(245,242,236,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 14px;gap:6px;user-select:none;
}
.logo{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--ink);margin-right:4px}
.logo b{font-style:normal;color:var(--am);font-weight:600}
.tsep{width:1px;height:20px;background:var(--bd2);margin:0 1px}
.tbtn{height:27px;padding:0 10px;background:var(--sf);border:1px solid var(--bd);border-radius:5px;color:var(--tx2);font-family:var(--mono);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--bg3);border-color:var(--bd2);color:var(--tx)}
.tsp{flex:1}
.thint{font-size:10px;color:var(--tx3);font-family:var(--mono)}

/* ── LAYOUT ── */
#layout{position:fixed;top:44px;left:0;right:0;bottom:0;display:flex}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sb-w);min-width:var(--sb-w);
  background:var(--sf2);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;z-index:200;
  user-select:none;
}
#sb-head{
  padding:12px 12px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
#sb-title{font-family:var(--mono);font-size:9.5px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
#btn-new-chat{
  width:100%;height:30px;background:var(--am);border:none;border-radius:6px;
  color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .12s;
}
#btn-new-chat:hover{background:var(--am2)}
#sb-list{flex:1;overflow-y:auto;padding:6px 0;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.sb-item{
  display:flex;align-items:center;gap:0;
  padding:7px 10px 7px 12px;cursor:pointer;
  border-radius:0;transition:background .1s;
  border-left:2px solid transparent;
  position:relative;
}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg2);border-left-color:var(--am)}
.sb-item-info{flex:1;min-width:0}
.sb-item-name{
  font-family:var(--serif);font-size:12px;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-style:italic;
}
.sb-item.active .sb-item-name{color:var(--am2);font-weight:600}
.sb-item-date{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:2px}
.sb-item-del{
  opacity:0;width:18px;height:18px;flex-shrink:0;
  background:none;border:1px solid transparent;border-radius:3px;
  color:var(--tx3);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.sb-item:hover .sb-item-del{opacity:1}
.sb-item-del:hover{border-color:var(--re);color:var(--re);background:rgba(190,48,48,.06)}
.sb-empty{padding:20px 14px;font-family:var(--mono);font-size:10px;color:var(--tx3);text-align:center;line-height:1.6}

/* ── MAIN THREAD ── */
#main{
  width:var(--main-w);min-width:var(--main-w);
  background:var(--sf);border-right:2px solid var(--bd);
  display:flex;flex-direction:column;z-index:100;
  box-shadow:3px 0 16px rgba(0,0,0,.07);
}
#main-head{
  padding:11px 14px 10px;border-bottom:1px solid var(--bd);
  background:var(--sf2);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
#chat-title-wrap{flex:1;min-width:0}
.mbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--grg);border:1px solid rgba(71,110,65,.28);border-radius:4px;font-family:var(--mono);font-size:8.5px;color:var(--gr);font-weight:500;letter-spacing:.4px}
#chat-title{
  font-size:12px;color:var(--tx2);margin-top:4px;font-family:var(--serif);
  font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:text;outline:none;border:none;background:transparent;width:100%;
  padding:0;
}
#chat-title:focus{color:var(--tx);font-style:normal}
#main-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
#main-footer{flex-shrink:0;border-top:1px solid var(--bd);padding:10px 12px;background:var(--sf2)}

/* ── CANVAS AREA ── */
#canvas-wrap{
  flex:1;position:relative;overflow:hidden;cursor:grab;background:var(--bg);
}
#canvas-wrap.panning{cursor:grabbing}
#canvas-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(0,0,0,.065) 1px,transparent 1px);
  background-size:24px 24px;
}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#svg-layer{position:absolute;top:0;left:0;width:20000px;height:20000px;pointer-events:none;overflow:visible}
.edge-branch{fill:none;stroke:var(--gr);stroke-width:1.5}
.edge-wire{fill:none;stroke:var(--bl);stroke-width:1.8;stroke-dasharray:6 3;opacity:.65}
.edge-live{fill:none;stroke:var(--bl);stroke-width:2;stroke-dasharray:5 3;opacity:.8}

/* empty canvas state */
#canvas-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:1;gap:10px}
.ei{font-size:42px;opacity:.18}
.et{font-size:13px;color:var(--tx3);font-style:italic}
.es{font-size:10.5px;color:var(--tx3);font-family:var(--mono);opacity:.65}

/* ── MESSAGE PAIR ── */
.mw{border-bottom:1px solid var(--bd);position:relative}
.mw:last-child{border-bottom:none}
.urow{padding:10px 13px 6px;display:flex;justify-content:flex-end}
.ubub{background:var(--bg2);border:1px solid var(--bd);border-radius:10px 10px 2px 10px;padding:8px 11px;font-size:12.5px;line-height:1.6;max-width:92%;word-break:break-word;color:var(--ink)}
.arow{padding:4px 13px 7px}
.abody{font-size:12px;line-height:1.78;color:var(--tx2);word-break:break-word}
.abody .p{display:block;margin-bottom:5px}
.abody .bl{display:block;padding-left:13px;position:relative;margin-bottom:3px}
.abody .bl::before{content:'·';position:absolute;left:0;color:var(--am);font-size:15px;line-height:1.1}
.abody .bo{color:var(--tx);font-weight:600}
.abody .co{background:var(--bg2);padding:1px 4px;border-radius:3px;font-size:10.5px;font-family:var(--mono)}
.abody .hd{display:block;color:var(--tx);font-weight:600;margin:8px 0 3px;font-size:13px}
.ld{display:inline-flex;gap:4px;padding:4px 0;align-items:center}
.ld i{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--am);animation:lda 1.2s infinite;font-style:normal}
.ld i:nth-child(2){animation-delay:.2s}.ld i:nth-child(3){animation-delay:.4s}
@keyframes lda{0%,100%{opacity:.12;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}
.er{color:var(--re);font-size:11px;font-family:var(--mono)}
.acts{padding:2px 13px 8px;display:flex;gap:5px;opacity:0;transition:opacity .12s}
.mw:hover .acts{opacity:1}
.abtn{height:21px;padding:0 8px;background:transparent;border:1px solid var(--bd);border-radius:3px;color:var(--tx3);font-family:var(--mono);font-size:9px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .12s}
.abtn:hover{background:var(--amg);border-color:rgba(181,114,50,.4);color:var(--am2)}
.abtn.wbtn:hover{background:var(--blg);border-color:rgba(38,95,160,.4);color:var(--bl)}
.wdot{position:absolute;right:-13px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:var(--sf);border:2px solid var(--bd2);cursor:crosshair;z-index:300;opacity:0;transition:all .15s}
.mw:hover .wdot{opacity:1}
.wdot:hover,.wdot.on{background:var(--bl);border-color:var(--bl);box-shadow:0 0 0 3px rgba(38,95,160,.15);opacity:1!important}

/* branch card right-side wire port */
.bcard-wport{position:absolute;right:-13px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;background:var(--sf);border:2px solid var(--bd2);cursor:crosshair;z-index:400;opacity:0;transition:all .15s}
.bcard:hover .bcard-wport{opacity:1}
.bcard-wport:hover,.bcard-wport.on{background:var(--bl);border-color:var(--bl);box-shadow:0 0 0 4px rgba(38,95,160,.15);opacity:1!important}

/* depth coloring for sub-branches */
.bcard[data-depth="1"] .bhead{background:rgba(181,114,50,.04)}
.bcard[data-depth="2"] .bhead{background:rgba(71,110,65,.05)}
.bcard[data-depth="3"] .bhead{background:rgba(38,95,160,.05)}
.bcard[data-depth="4"] .bhead{background:rgba(150,80,160,.05)}
.bbadge.sub1{background:rgba(181,114,50,.1);border-color:rgba(181,114,50,.3);color:var(--am2)}
.bbadge.sub2{background:var(--grg);border-color:rgba(71,110,65,.28);color:var(--gr)}
.bbadge.sub3{background:var(--blg);border-color:rgba(38,95,160,.2);color:var(--bl)}
.bbadge.sub4{background:rgba(150,80,160,.1);border-color:rgba(150,80,160,.3);color:#965fa0}
.edge-branch-1{fill:none;stroke:var(--am);stroke-width:1.5;opacity:.7}
.edge-branch-2{fill:none;stroke:var(--gr);stroke-width:1.5;opacity:.7}
.edge-branch-3{fill:none;stroke:var(--bl);stroke-width:1.5;opacity:.7}
.edge-branch-4{fill:none;stroke:#965fa0;stroke-width:1.5;opacity:.7}

/* ── COMPOSER ── */
.comp{display:flex;flex-direction:column;gap:5px}
.crow{display:flex;align-items:flex-end;gap:7px}
.cta{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:8px;outline:none;font-family:var(--serif);font-size:12.5px;color:var(--ink);line-height:1.55;resize:none;min-height:38px;max-height:110px;padding:8px 10px;transition:border-color .12s;scrollbar-width:thin}
.cta:focus{border-color:var(--bd2)}
.cta::placeholder{color:var(--tx3);font-style:italic}
.cta:disabled{opacity:.38}
.csend{width:32px;height:32px;flex-shrink:0;background:var(--am);border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.csend:hover:not(:disabled){background:var(--am2)}
.csend:disabled{opacity:.28;cursor:not-allowed}
.csend svg{width:13px;height:13px}
.cmeta{font-size:9px;color:var(--tx3);font-family:var(--mono);display:flex;flex-wrap:wrap;gap:4px}
.cpill{padding:1px 7px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px}
.cpill.wp{background:var(--blg);border-color:rgba(38,95,160,.2);color:var(--bl)}

/* ── BRANCH CARD ── */
.bcard{position:absolute;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;box-shadow:var(--sh);width:380px;display:flex;flex-direction:column;font-family:var(--serif);transition:box-shadow .15s,border-color .15s}
.bcard:hover{box-shadow:var(--sh2);border-color:var(--bd2)}
.bcard.wired{border-color:rgba(38,95,160,.35)}
.bhead{padding:9px 12px 8px;border-bottom:1px solid var(--bd);background:var(--sf2);border-radius:11px 11px 0 0;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;cursor:move;user-select:none}
.bbadge{padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:8.5px;font-weight:500;letter-spacing:.3px;background:var(--amg);border:1px solid rgba(181,114,50,.25);color:var(--am2)}
.bbadge.wb{background:var(--blg);border-color:rgba(38,95,160,.2);color:var(--bl)}
.bcl{margin-left:auto;width:17px;height:17px;background:none;border:1px solid var(--bd);border-radius:3px;color:var(--tx3);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--mono);flex-shrink:0}
.bcl:hover{border-color:var(--re);color:var(--re);background:rgba(192,48,48,.05)}
.rpills{display:flex;flex-wrap:wrap;gap:3px;width:100%;margin-top:3px}
.rpill{display:flex;align-items:center;gap:3px;padding:2px 6px;background:var(--blg);border:1px solid rgba(38,95,160,.2);border-radius:3px;font-family:var(--mono);font-size:8px;color:var(--bl)}
.rpillx{background:none;border:none;color:rgba(38,95,160,.35);cursor:pointer;font-size:10px;padding:0;line-height:1}
.rpillx:hover{color:var(--re)}
.bmsgs{display:flex;flex-direction:column}
.bfoot{padding:8px 10px;border-top:1px solid var(--bd);background:var(--sf2);border-radius:0 0 11px 11px}

/* ── WIRE TOAST ── */
#wtip{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bl);color:#fff;border-radius:7px;padding:8px 20px;font-family:var(--mono);font-size:11px;pointer-events:none;z-index:9998;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 18px rgba(38,95,160,.35)}
#wtip.on{opacity:1}

/* ── MINIMAP ── */
#mm{position:absolute;bottom:12px;right:12px;width:120px;height:75px;background:rgba(255,255,255,.88);border:1px solid var(--bd);border-radius:7px;overflow:hidden;pointer-events:none;z-index:50}
#mmc{width:100%;height:100%}

*{scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}

/* ── PIN OVERLAY ── */
#auth-overlay{
  position:fixed;inset:0;z-index:99999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
#auth-overlay.hidden{display:none}
#auth-box{
  width:300px;background:var(--sf);border:1px solid var(--bd);
  border-radius:14px;box-shadow:var(--sh2);padding:32px 28px;
  display:flex;flex-direction:column;gap:16px;align-items:center;
}
#auth-logo{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--ink);text-align:center}
#auth-logo b{font-style:normal;color:var(--am)}
#auth-desc{font-family:var(--mono);font-size:10px;color:var(--tx3);text-align:center;line-height:1.6}
#pin-input{
  width:140px;height:52px;text-align:center;letter-spacing:12px;
  font-family:var(--mono);font-size:26px;font-weight:500;color:var(--ink);
  background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;
  outline:none;transition:border-color .12s;
}
#pin-input:focus{border-color:var(--am)}
#auth-submit{
  width:100%;height:38px;background:var(--am);border:none;border-radius:8px;
  color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;
  cursor:pointer;transition:background .12s;
}
#auth-submit:hover{background:var(--am2)}
#auth-submit:disabled{opacity:.4;cursor:not-allowed}
#auth-msg{font-family:var(--mono);font-size:10px;text-align:center;min-height:14px}
#auth-msg.err{color:var(--re)}
#auth-msg.ok{color:var(--gr)}

/* user pill in toolbar */
#user-pill{display:flex;align-items:center;gap:6px;padding:3px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;font-family:var(--mono);font-size:9.5px;color:var(--tx2)}
#btn-logout{height:22px;padding:0 8px;background:transparent;border:1px solid var(--bd);border-radius:4px;color:var(--tx3);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all .12s}
#btn-logout:hover{border-color:var(--re);color:var(--re)}
</style>
</head>
<body>

<!-- PIN overlay -->
<div id="auth-overlay">
  <div id="auth-box">
    <div id="auth-logo">Prompt<b>Canvas</b></div>
    <div id="auth-desc">Enter your 4-digit PIN to access your chats.<br/>New PIN? It gets created automatically.</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off"/>
    <button id="auth-submit">Enter</button>
    <div id="auth-msg"></div>
  </div>
</div>

<div id="bar">
  <span class="logo">Prompt<b>Canvas</b></span>
  <div class="tsep"></div>
  <button class="tbtn" id="btn-fit">⊞ Fit branches</button>
  <button class="tbtn" id="btn-clear">✕ Clear branches</button>
  <div class="tsp"></div>
  <div id="user-pill"><span id="user-pin-label"></span><button id="btn-logout">Sign out</button></div>
  <span class="thint">Hover reply → ⎇ Branch or ⚡ Wire</span>
</div>

<div id="layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sb-head">
      <div id="sb-title">Chats</div>
      <button id="btn-new-chat">＋ New chat</button>
    </div>
    <div id="sb-list"></div>
  </div>

  <!-- Main thread -->
  <div id="main">
    <div id="main-head">
      <div id="chat-title-wrap">
        <span class="mbadge">⬤ Main thread</span>
        <input id="chat-title" type="text" placeholder="Untitled chat" spellcheck="false"/>
      </div>
    </div>
    <div id="main-msgs"></div>
    <div id="main-footer">
      <div class="comp" id="main-comp"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <svg id="svg-layer"></svg>
    <div id="canvas"></div>
    <div id="canvas-empty">
      <div class="ei">⎇</div>
      <div class="et">Branches appear here</div>
      <div class="es">Hover any reply in the main thread → click Branch</div>
    </div>
    <div id="mm"><canvas id="mmc"></canvas></div>
  </div>
</div>

<div id="wtip">Drop onto a branch to wire context</div>

<script>
// ═══════════════════════════════════════════════
// AUTH — 4-digit PIN
// ═══════════════════════════════════════════════
let _pin = null;

const authOverlay = document.getElementById('auth-overlay');
const authMsg = document.getElementById('auth-msg');
const authSubmit = document.getElementById('auth-submit');
const pinInput = document.getElementById('pin-input');

function setAuthMsg(msg, cls=''){ authMsg.textContent=msg; authMsg.className=cls; }

// Only allow digits
pinInput.addEventListener('input', ()=>{
  pinInput.value = pinInput.value.replace(/\D/g,'').slice(0,4);
  authSubmit.disabled = pinInput.value.length !== 4;
});
authSubmit.disabled = true;

pinInput.addEventListener('keydown', e=>{ if(e.key==='Enter' && pinInput.value.length===4) authSubmit.click(); });

authSubmit.addEventListener('click', async ()=>{
  const pin = pinInput.value;
  if(pin.length !== 4){ setAuthMsg('Enter a 4-digit PIN','err'); return; }
  authSubmit.disabled = true;
  setAuthMsg('…');
  const res = await fetch('/api/auth', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pin})
  });
  const data = await res.json();
  authSubmit.disabled = false;
  if(data.error){ setAuthMsg(data.error,'err'); return; }
  _pin = pin;
  localStorage.setItem('pc_pin', pin);
  document.getElementById('user-pin-label').textContent = 'PIN ••••';
  authOverlay.classList.add('hidden');
  boot();
});

document.getElementById('btn-logout').addEventListener('click', ()=>{
  _pin = null;
  localStorage.removeItem('pc_pin');
  localStorage.removeItem('pc_active');
  clearSession();
  document.getElementById('main-msgs').innerHTML='';
  document.getElementById('canvas').innerHTML='';
  document.getElementById('svg-layer').innerHTML='';
  document.getElementById('canvas-empty').style.display='flex';
  document.getElementById('sb-list').innerHTML='';
  pinInput.value='';
  authSubmit.disabled=true;
  setAuthMsg('');
  authOverlay.classList.remove('hidden');
});

// ═══════════════════════════════════════════════
// STORAGE (API-backed, keyed by PIN)
// ═══════════════════════════════════════════════
let _allChats = {};

function getPin(){ return _pin || ''; }

async function loadAllChatsFromServer(){
  const r = await fetch('/api/chats?pin='+getPin());
  if(!r.ok) return {};
  return r.json();
}

async function saveChatToServer(chatData){

// Serialize current session to plain object
function serializeSession(){
  return {
    id: currentChatId,
    title: document.getElementById('chat-title').value || 'Untitled chat',
    updatedAt: Date.now(),
    mainMsgs: mainMsgs.map(m=>({id:m.id,role:m.role,text:m.text,status:m.status==='loading'?'error':m.status})),
    branches: [...branches.entries()].map(([bid,b])=>({
      id:b.id, parentMsgId:b.parentMsgId, parentBid:b.parentBid||null, refMsgIds:b.refMsgIds,
      msgs:b.msgs.map(m=>({id:m.id,role:m.role,text:m.text,status:m.status==='loading'?'error':m.status})),
      x:b.x, y:b.y
    })),
    wires: wires.map(w=>({id:w.id,fromMsgId:w.fromMsgId,fromBid:w.fromBid,toBid:w.toBid})),
    counters: {mid:_mid, bid:_bid, wid:_wid},
    view: {x:V.x, y:V.y, z:V.z}
  };
}

function saveCurrentChat(){
  if(!currentChatId||!_session) return;
  const data = serializeSession();
  _allChats[currentChatId] = data;

// SESSION STATE
// ═══════════════════════════════════════════════
let currentChatId = null;
let _mid=1, _bid=1, _wid=1;
const mainMsgs = [];
const branches = new Map();
const wires    = [];
const V = { x:40, y:40, z:1, panning:false, ps:null };
let wiringFrom=null, wiringFromBid=null;
let draggingCard=null, dcMouse=null, livePath=null;

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function parseMd(text){
  let h='';
  for(const raw of (text||'').split('\n')){
    const t=raw.trim(); if(!t) continue;
    let l=t.replace(/\*\*(.*?)\*\*/g,'<span class="bo">$1</span>').replace(/`([^`]+)`/g,'<span class="co">$1</span>');
    if(/^#{1,3}\s/.test(t))       h+=`<span class="hd">${l.replace(/^#+\s/,'')}</span>`;
    else if(/^[•\-\*]\s/.test(t)) h+=`<span class="bl">${l.replace(/^[•\-\*]\s/,'')}</span>`;
    else if(/^\d+\.\s/.test(t))   h+=`<span class="bl">${l}</span>`;
    else                           h+=`<span class="p">${l}</span>`;
  }
  return h||'';
}
function getMsg(mid){
  let m=mainMsgs.find(m=>m.id===mid); if(m) return m;
  for(const b of branches.values()){ m=b.msgs.find(m=>m.id===mid); if(m) return m; }
  return null;
}
function getMsgSource(mid){
  if(mainMsgs.some(m=>m.id===mid)) return 'main';
  for(const b of branches.values()) if(b.msgs.some(m=>m.id===mid)) return b;
  return null;
}
function getBranchDepth(bid){
  let d=0, b=branches.get(bid);
  while(b&&b.parentBid!=null){ d++; b=branches.get(b.parentBid); }
  return d;
}
function renderAiBody(m){
  if(m.status==='loading') return '<div class="ld"><i></i><i></i><i></i></div>';
  if(m.status==='error')   return `<span class="er">⚠ ${esc(m.text)}</span>`;
  return parseMd(m.text);
}

// ═══════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════
async function callClaude(messages){
  const res=await fetch('/api/chat',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:'You are a helpful assistant in a spatial canvas chat. Format with • for bullets, **bold** for key terms. Be concise and focused.',
      messages})
  });
  if(!res.ok){const t=await res.text().catch(()=>'');throw new Error(`API ${res.status}: ${t.slice(0,120)}`);}
  const d=await res.json();
  return d.content?.map(b=>b.text||'').join('')||'(empty)';
}

// ═══════════════════════════════════════════════
// HISTORY BUILDERS
// ═══════════════════════════════════════════════
function buildMainHistory(upToId){
  const out=[];
  for(const m of mainMsgs){
    if(m.id===upToId) break;
    if(m.role==='user') out.push({role:'user',content:m.text});
    if(m.role==='ai'&&m.status==='done'&&m.text) out.push({role:'assistant',content:m.text});
  }
  return out;
}
function getAncestorMsgs(parentMsgId){
  const out=[];
  const srcMain=mainMsgs.find(m=>m.id===parentMsgId);
  if(srcMain){
    for(const m of mainMsgs){
      if(m.role==='user') out.push({role:'user',content:m.text});
      if(m.role==='ai'&&m.status==='done'&&m.text){
        out.push({role:'assistant',content:m.text});
        if(m.id===parentMsgId) break;
      }
    }
    return out;
  }
  for(const [,anc] of branches){
    const found=anc.msgs.find(m=>m.id===parentMsgId);
    if(found){
      if(anc.parentMsgId) getAncestorMsgs(anc.parentMsgId).forEach(m=>out.push(m));
      for(const m of anc.msgs){
        if(m.role==='user') out.push({role:'user',content:m.text});
        if(m.role==='ai'&&m.status==='done'&&m.text){
          out.push({role:'assistant',content:m.text});
          if(m.id===parentMsgId) break;
        }
      }
      return out;
    }
  }
  return out;
}
function buildBranchHistory(bid,upToId){
  const b=branches.get(bid); if(!b) return [];
  const out=[];
  if(b.refMsgIds.length){
    const refs=b.refMsgIds.map(mid=>{
      const m=getMsg(mid); const src=getMsgSource(mid);
      const label=src==='main'?'Main thread':`Branch #${src.id}`;
      return `[WIRED CONTEXT from ${label}]\n${m?.role==='user'?'User':'Assistant'}: ${m?.text||''}`;
    }).join('\n\n');
    out.push({role:'user',content:refs+'\n\n[Use this as additional context.]'});
    out.push({role:'assistant',content:"Got it, I'll use that context."});
  }
  if(b.parentMsgId) getAncestorMsgs(b.parentMsgId).forEach(m=>out.push(m));
  for(const m of b.msgs){
    if(m.id===upToId) break;
    if(m.role==='user') out.push({role:'user',content:m.text});
    if(m.role==='ai'&&m.status==='done'&&m.text) out.push({role:'assistant',content:m.text});
  }
  return out;
}

// ═══════════════════════════════════════════════
// COMPOSER FACTORY
// ═══════════════════════════════════════════════
function makeComposer(placeholder, onSend, metaPills=[]){
  const wrap=document.createElement('div'); wrap.className='comp';
  const crow=document.createElement('div'); crow.className='crow';
  const ta=document.createElement('textarea'); ta.className='cta'; ta.rows=1; ta.placeholder=placeholder;
  const btn=document.createElement('button'); btn.className='csend'; btn.disabled=true;
  btn.innerHTML=`<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="17" x2="10" y2="3"/><polyline points="5 8 10 3 15 8"/></svg>`;
  crow.appendChild(ta); crow.appendChild(btn); wrap.appendChild(crow);
  if(metaPills.length){
    const meta=document.createElement('div'); meta.className='cmeta';
    metaPills.forEach(p=>{ const sp=document.createElement('span'); sp.className='cpill'+(p.wire?' wp':''); sp.textContent=p.label; meta.appendChild(sp); });
    wrap.appendChild(meta);
  }
  ta.addEventListener('input',()=>{ ta.style.height='0'; ta.style.height=ta.scrollHeight+'px'; btn.disabled=!ta.value.trim(); });
  async function doSend(){
    const text=ta.value.trim(); if(!text||ta.disabled) return;
    ta.value=''; ta.style.height=''; btn.disabled=true; ta.disabled=true;
    await onSend(text); ta.disabled=false; ta.focus();
  }
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();} });
  btn.addEventListener('click',doSend);
  return wrap;
}

// ═══════════════════════════════════════════════
// MSG PAIR ELEMENT
// ═══════════════════════════════════════════════
function makePairEl(userMsg, aiMsg, opts={}){
  const div=document.createElement('div'); div.className='mw'; if(aiMsg) div.dataset.mid=aiMsg.id;
  const ur=document.createElement('div'); ur.className='urow';
  ur.innerHTML=`<div class="ubub">${esc(userMsg.text)}</div>`;
  div.appendChild(ur);
  if(!aiMsg) return div;
  const ar=document.createElement('div'); ar.className='arow';
  ar.innerHTML=`<div class="abody" id="ab-${aiMsg.id}">${renderAiBody(aiMsg)}</div>`;
  div.appendChild(ar);
  if(opts.wireDot){
    const dot=document.createElement('div'); dot.className='wdot'; dot.title='Drag to wire as context';
    dot.addEventListener('mousedown',e=>{ e.stopPropagation(); startWire(aiMsg.id,dot,opts.sourceBid||null); });
    div.appendChild(dot);
  }
  const acts=document.createElement('div'); acts.className='acts'; acts.id='aa-'+aiMsg.id;
  if(aiMsg.status==='done') populateActs(acts,aiMsg.id,opts);
  div.appendChild(acts);
  return div;
}
function populateActs(el, aiMsgId, opts={}){
  el.innerHTML='';
  if(opts.onBranch){
    const b=document.createElement('button'); b.className='abtn'; b.textContent='⎇ Branch';
    b.addEventListener('click',()=>opts.onBranch(aiMsgId)); el.appendChild(b);
  }
  if(opts.wireDot){
    const w=document.createElement('button'); w.className='abtn wbtn'; w.textContent='⚡ Wire';
    w.addEventListener('mousedown',e=>{ e.stopPropagation(); startWire(aiMsgId,w,opts.sourceBid||null); }); el.appendChild(w);
  }
  const cp=document.createElement('button'); cp.className='abtn'; cp.textContent='⎘ Copy';
  cp.addEventListener('click',()=>navigator.clipboard?.writeText(getMsg(aiMsgId)?.text||'')); el.appendChild(cp);
}

// ═══════════════════════════════════════════════
// MAIN THREAD
// ═══════════════════════════════════════════════
function initMain(){
  document.getElementById('main-comp').innerHTML='';
  const comp=makeComposer('Ask anything…',sendMain);
  document.getElementById('main-comp').appendChild(comp);
  setTimeout(()=>comp.querySelector('.cta').focus(),80);
}
async function sendMain(text){
  const uid=_mid++, aid=_mid++;
  mainMsgs.push({id:uid,role:'user',text,status:'done'});
  mainMsgs.push({id:aid,role:'ai',text:'',status:'loading'});
  const userMsg=mainMsgs.find(m=>m.id===uid), aiMsg=mainMsgs.find(m=>m.id===aid);
  const el=makePairEl(userMsg,aiMsg,{onBranch:branchFromMain,wireDot:true});
  document.getElementById('main-msgs').appendChild(el);
  scrollMain();
  // auto-title from first message
  if(mainMsgs.filter(m=>m.role==='user').length===1){
    const t=text.slice(0,40)+(text.length>40?'…':'');
    document.getElementById('chat-title').value=t;
    scheduleSave();
  }
  try{
    const reply=await callClaude(buildMainHistory(aid));
    aiMsg.text=reply; aiMsg.status='done';
  } catch(e){ aiMsg.status='error'; aiMsg.text=e.message; }
  const body=document.getElementById('ab-'+aid);
  if(body) body.innerHTML=renderAiBody(aiMsg);
  const acts=document.getElementById('aa-'+aid);
  if(acts) populateActs(acts,aid,{onBranch:branchFromMain,wireDot:true});
  drawConnectors(); drawMinimap(); scrollMain(); scheduleSave();
}
function scrollMain(){ const el=document.getElementById('main-msgs'); setTimeout(()=>el.scrollTop=el.scrollHeight,40); }

// ═══════════════════════════════════════════════
// BRANCH
// ═══════════════════════════════════════════════
function branchFromMain(aiMsgId){
  const bid=_bid++;
  const count=branches.size;
  const x=40+(count%3)*430, y=40+Math.floor(count/3)*400;
  branches.set(bid,{id:bid,parentMsgId:aiMsgId,parentBid:null,refMsgIds:[],msgs:[],x,y,el:null});
  renderBranchCard(bid);
  document.getElementById('canvas-empty').style.display='none';
  drawConnectors(); drawMinimap(); scheduleSave();
}
function branchFromBranch(parentBid, aiMsgId){
  const parentBranch=branches.get(parentBid); if(!parentBranch) return;
  const bid=_bid++;
  // place to the right of parent, staggered vertically
  const siblings=[...branches.values()].filter(b=>b.parentBid===parentBid);
  const x=parentBranch.x+400;
  const y=parentBranch.y+siblings.length*360;
  branches.set(bid,{id:bid,parentMsgId:aiMsgId,parentBid:parentBid,refMsgIds:[],msgs:[],x,y,el:null});
  renderBranchCard(bid);
  document.getElementById('canvas-empty').style.display='none';
  drawConnectors(); drawMinimap(); scheduleSave();
}
function renderBranchCard(bid){
  const b=branches.get(bid); if(!b) return;
  if(b.el) b.el.remove();
  const depth=getBranchDepth(bid);
  const depthColors=['','sub1','sub2','sub3','sub4'];
  const card=document.createElement('div');
  card.className='bcard'+(b.refMsgIds.length?' wired':'');
  card.dataset.bid=bid;
  card.dataset.depth=depth;
  card.style.left=b.x+'px'; card.style.top=b.y+'px';
  // head
  const head=document.createElement('div'); head.className='bhead';
  const badge=document.createElement('span');
  badge.className='bbadge '+(depthColors[Math.min(depth,4)]||'');
  const depthLabel=depth===0?`Branch #${bid}`:`${'└─'.repeat(depth)} Branch #${bid}`;
  badge.textContent=depthLabel;
  head.appendChild(badge);
  if(b.refMsgIds.length){ const wb=document.createElement('span'); wb.className='bbadge wb'; wb.textContent='⚡ wired'; head.appendChild(wb); }
  // depth badge
  if(depth>0){
    const db=document.createElement('span'); db.className='bbadge';
    db.style.cssText='background:rgba(0,0,0,.04);border-color:var(--bd);color:var(--tx3);font-size:8px';
    db.textContent=`depth ${depth}`; head.appendChild(db);
  }
  const cl=document.createElement('button'); cl.className='bcl'; cl.title='Close branch'; cl.textContent='✕';
  cl.addEventListener('click',()=>{
    // also remove child branches recursively
    function removeBranchTree(rbid){
      branches.forEach((cb,cbid)=>{ if(cb.parentBid===rbid) removeBranchTree(cbid); });
      const rb=branches.get(rbid); if(rb?.el) rb.el.remove();
      branches.delete(rbid);
      for(let i=wires.length-1;i>=0;i--){ if(wires[i].toBid===rbid||wires[i].fromBid===rbid) wires.splice(i,1); }
    }
    removeBranchTree(bid);
    drawConnectors(); drawMinimap();
    if(!branches.size) document.getElementById('canvas-empty').style.display='flex';
    scheduleSave();
  });
  head.appendChild(cl);
  if(b.refMsgIds.length){
    const pills=document.createElement('div'); pills.className='rpills';
    b.refMsgIds.forEach(mid=>{
      const m=getMsg(mid); const pill=document.createElement('span'); pill.className='rpill';
      pill.innerHTML=`⚡ ${esc((m?.text||`#${mid}`).slice(0,30))}… <button class="rpillx">✕</button>`;
      pill.querySelector('.rpillx').addEventListener('click',e=>{
        e.stopPropagation();
        b.refMsgIds=b.refMsgIds.filter(r=>r!==mid);
        for(let i=wires.length-1;i>=0;i--){ if(wires[i].fromMsgId===mid&&wires[i].toBid===bid) wires.splice(i,1); }
        renderBranchCard(bid); drawConnectors(); drawMinimap(); scheduleSave();
      });
      pills.appendChild(pill);
    });
    head.appendChild(pills);
  }
  head.addEventListener('mousedown',e=>{
    if(e.target.closest('button')) return;
    e.stopPropagation();
    draggingCard={b}; dcMouse={x:e.clientX,y:e.clientY,ox:b.x,oy:b.y};
  });
  card.appendChild(head);

  // right-side wire port (drag from branch card itself)
  const wport=document.createElement('div'); wport.className='bcard-wport'; wport.title='Drag to wire this branch as context to another';
  wport.addEventListener('mousedown',e=>{
    e.stopPropagation();
    // create a synthetic "last AI msg" wire from this branch
    const lastAiMsg=b.msgs.filter(m=>m.role==='ai'&&m.status==='done').slice(-1)[0];
    if(!lastAiMsg){ showTip('Send a message first to wire this branch'); return; }
    startWire(lastAiMsg.id, wport, bid);
  });
  card.appendChild(wport);

  // seed actions: Branch + Wire buttons for the parent message, no content shown
  if(b.parentMsgId){
    const parentMsg=getMsg(b.parentMsgId);
    if(parentMsg){
      const seedBar=document.createElement('div');
      seedBar.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 10px;border-bottom:1px solid var(--bd);background:var(--bg)';
      const seedLabel=document.createElement('span');
      seedLabel.style.cssText='font-family:var(--mono);font-size:8px;color:var(--tx3);letter-spacing:.3px;flex:1';
      seedLabel.textContent='↳ branched from parent';
      const brBtn=document.createElement('button'); brBtn.className='abtn'; brBtn.textContent='⎇ Branch';
      brBtn.addEventListener('click',()=>branchFromBranch(bid,parentMsg.id));
      const wrBtn=document.createElement('button'); wrBtn.className='abtn wbtn'; wrBtn.textContent='⚡ Wire';
      wrBtn.addEventListener('mousedown',e=>{ e.stopPropagation(); startWire(parentMsg.id,wrBtn,b.parentBid); });
      seedBar.appendChild(seedLabel); seedBar.appendChild(brBtn); seedBar.appendChild(wrBtn);
      card.appendChild(seedBar);
    }
  }

  // messages — sub-branches get full branch+wire options
  const msgsEl=document.createElement('div'); msgsEl.className='bmsgs'; msgsEl.id='bmsgs-'+bid;
  pairMsgs(b.msgs).forEach(({user,ai})=>{
    msgsEl.appendChild(makePairEl(user,ai,{
      wireDot:true,
      sourceBid:bid,
      onBranch:(aid)=>branchFromBranch(bid,aid)
    }));
  });
  card.appendChild(msgsEl);

  // wire drop — any branch can receive wires from any other branch
  card.addEventListener('mouseup',e=>{
    if(wiringFrom===null) return;
    e.stopPropagation();
    const fid=wiringFrom; const srcBid=wiringFromBid; wiringFrom=null;
    clearWireDrag();
    const src=getMsgSource(fid);
    const srcBidCheck=src==='main'?null:src?.id;
    if(srcBidCheck===bid){ showTip('Wire must go to a different branch'); return; }
    if(b.refMsgIds.includes(fid)){ showTip('Already wired'); return; }
    b.refMsgIds.push(fid);
    wires.push({id:_wid++,fromMsgId:fid,fromBid:srcBid,toBid:bid});
    renderBranchCard(bid); drawConnectors(); drawMinimap();
    showTip('⚡ Wired — context included in next reply'); scheduleSave();
  });

  // composer
  const metaPills=[{label:`depth ${depth} branch`}];
  b.refMsgIds.forEach(mid=>{ const m=getMsg(mid); metaPills.push({label:`⚡ ${(m?.text||'').slice(0,16)}…`,wire:true}); });
  const foot=document.createElement('div'); foot.className='bfoot';
  foot.appendChild(makeComposer('Continue this branch…',t=>sendBranch(bid,t),metaPills));
  card.appendChild(foot);
  b.el=card;
  document.getElementById('canvas').appendChild(card);
}
function pairMsgs(msgs){
  const pairs=[];
  for(let i=0;i<msgs.length;i++){
    const m=msgs[i];
    if(m.role==='user'){ const next=msgs[i+1]; if(next?.role==='ai'){pairs.push({user:m,ai:next});i++;}else pairs.push({user:m,ai:null}); }
  }
  return pairs;
}
async function sendBranch(bid,text){
  const b=branches.get(bid); if(!b) return;
  const uid=_mid++, aid=_mid++;
  b.msgs.push({id:uid,role:'user',text,status:'done'});
  b.msgs.push({id:aid,role:'ai',text:'',status:'loading'});
  const msgsEl=document.getElementById('bmsgs-'+bid);
  const userMsg=b.msgs.find(m=>m.id===uid), aiMsg=b.msgs.find(m=>m.id===aid);
  if(msgsEl) msgsEl.appendChild(makePairEl(userMsg,aiMsg,{
    wireDot:true,
    sourceBid:bid,
    onBranch:(aid)=>branchFromBranch(bid,aid)
  }));
  // update wire port availability
  const wport=b.el?.querySelector('.bcard-wport');
  try{
    const reply=await callClaude(buildBranchHistory(bid,aid));
    aiMsg.text=reply; aiMsg.status='done';
  } catch(e){ aiMsg.status='error'; aiMsg.text=e.message; }
  const body=document.getElementById('ab-'+aid);
  if(body) body.innerHTML=renderAiBody(aiMsg);
  const acts=document.getElementById('aa-'+aid);
  if(acts) populateActs(acts,aid,{
    wireDot:true,
    sourceBid:bid,
    onBranch:(aid)=>branchFromBranch(bid,aid)
  });
  drawMinimap(); scheduleSave();
}

// ═══════════════════════════════════════════════
// WIRE SYSTEM
// ═══════════════════════════════════════════════
function startWire(msgId,triggerEl,sourceBid=null){
  wiringFrom=msgId; wiringFromBid=sourceBid;
  if(triggerEl.classList) triggerEl.classList.add('on');
  showTip('Drop onto a branch to wire this as context →',true);
}
function clearWireDrag(){
  document.querySelectorAll('.wdot.on,.abtn.on').forEach(el=>el.classList.remove('on'));
  hideTip(); wiringFromBid=null;
  if(livePath){ livePath.remove(); livePath=null; }
  drawConnectors();
}

// ═══════════════════════════════════════════════
// SVG CONNECTORS
// ═══════════════════════════════════════════════
function drawConnectors(){
  const svg=document.getElementById('svg-layer');
  [...svg.querySelectorAll('.edge-branch,.edge-wire,.edge-branch-1,.edge-branch-2,.edge-branch-3,.edge-branch-4')].forEach(e=>e.remove());
  const mainW=document.getElementById('main').offsetWidth;
  branches.forEach((b)=>{
    let srcX,srcY;
    const depth=getBranchDepth(b.id);
    const edgeCls=depth===0?'edge-branch':`edge-branch-${Math.min(depth,4)}`;
    if(b.parentBid!=null){
      const pb=branches.get(b.parentBid);
      if(!pb){ return; }
      srcX=pb.x+380; srcY=pb.y+60;
    } else {
      srcX=mainW/V.z; srcY=b.y+30;
    }
    const dx=b.x, dy=b.y+30, mx=(srcX+dx)/2;
    svg.appendChild(mkPath(`M${srcX},${srcY} C${mx},${srcY} ${mx},${dy} ${dx},${dy}`,edgeCls));
  });
  wires.forEach(w=>{
    const b=branches.get(w.toBid); if(!b) return;
    let srcX,srcY;
    if(w.fromBid==null){ srcX=mainW/V.z; srcY=b.y+20; }
    else{ const sb=branches.get(w.fromBid); if(!sb) return; srcX=sb.x+380; srcY=sb.y+40; }
    const dx=b.x, dy=b.y+20, mx=(srcX+dx)*0.6;
    svg.appendChild(mkPath(`M${srcX},${srcY} C${mx},${srcY} ${mx},${dy} ${dx},${dy}`,'edge-wire'));
  });
  if(livePath) svg.appendChild(livePath);
}
function mkPath(d,cls){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d); p.setAttribute('class',cls); return p;
}

// ═══════════════════════════════════════════════
// PAN / ZOOM
// ═══════════════════════════════════════════════
const cvs=document.getElementById('canvas');
const wrap=document.getElementById('canvas-wrap');
function applyV(){
  cvs.style.transform=`translate(${V.x}px,${V.y}px) scale(${V.z})`;
  drawConnectors(); drawMinimap();
}
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const d=e.deltaY>0?.88:1.12, nz=Math.max(.07,Math.min(3,V.z*d));
  V.x=mx-(mx-V.x)*(nz/V.z); V.y=my-(my-V.y)*(nz/V.z); V.z=nz; applyV();
},{passive:false});
wrap.addEventListener('mousedown',e=>{
  if(wiringFrom!==null||draggingCard) return;
  const tgt=e.target;
  if(e.button===0&&(tgt===wrap||tgt===cvs||tgt.id==='svg-layer'||tgt.closest('#canvas-empty'))){
    V.panning=true; V.ps={x:e.clientX-V.x,y:e.clientY-V.y}; wrap.classList.add('panning');
  }
});
document.addEventListener('mousemove',e=>{
  if(draggingCard){
    const {b}=draggingCard;
    b.x=dcMouse.ox+(e.clientX-dcMouse.x)/V.z; b.y=dcMouse.oy+(e.clientY-dcMouse.y)/V.z;
    b.el.style.left=b.x+'px'; b.el.style.top=b.y+'px';
    drawConnectors(); drawMinimap(); return;
  }
  if(V.panning){ V.x=e.clientX-V.ps.x; V.y=e.clientY-V.ps.y; applyV(); return; }
  if(wiringFrom!==null){
    const r=cvs.getBoundingClientRect();
    const cx=(e.clientX-r.left)/V.z, cy=(e.clientY-r.top)/V.z;
    if(!livePath){ livePath=document.createElementNS('http://www.w3.org/2000/svg','path'); livePath.setAttribute('class','edge-live'); }
    let srcX;
    if(wiringFromBid!=null){
      srcX=(branches.get(wiringFromBid)?.x||0)+380;
    } else {
      srcX=document.getElementById('main').offsetWidth/V.z;
    }
    const srcY=cy; // follow mouse vertically for live preview
    const mx=(srcX+cx)/2;
    livePath.setAttribute('d',`M${srcX},${srcY} C${mx},${srcY} ${mx},${cy} ${cx},${cy}`);
    if(!document.getElementById('svg-layer').contains(livePath)) document.getElementById('svg-layer').appendChild(livePath);
  }
});
document.addEventListener('mouseup',e=>{
  if(draggingCard){ draggingCard=null; dcMouse=null; scheduleSave(); return; }
  V.panning=false; wrap.classList.remove('panning');
  if(wiringFrom!==null){ const el=document.elementFromPoint(e.clientX,e.clientY); if(!el?.closest('.bcard')){ wiringFrom=null; clearWireDrag(); } }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&wiringFrom!==null){ wiringFrom=null; clearWireDrag(); return; }
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if((e.metaKey||e.ctrlKey)&&e.key==='='){ e.preventDefault(); V.z=Math.min(3,V.z*1.2); applyV(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='-'){ e.preventDefault(); V.z=Math.max(.07,V.z*.8); applyV(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='0'){ e.preventDefault(); V.z=1; applyV(); }
});

// ═══════════════════════════════════════════════
// FIT & MINIMAP & TOAST
// ═══════════════════════════════════════════════
function fitBranches(){
  if(!branches.size) return;
  const pad=60, r=wrap.getBoundingClientRect();
  const xs=[...branches.values()].map(b=>b.x), ys=[...branches.values()].map(b=>b.y);
  const x0=Math.min(...xs)-pad, y0=Math.min(...ys)-pad;
  const x1=Math.max(...xs)+380+pad, y1=Math.max(...ys)+320+pad;
  V.z=Math.min(r.width/(x1-x0),r.height/(y1-y0),1.3);
  V.x=(r.width-(x1-x0)*V.z)/2-x0*V.z; V.y=(r.height-(y1-y0)*V.z)/2-y0*V.z;
  applyV();
}
function drawMinimap(){
  const c=document.getElementById('mmc'), ctx=c.getContext('2d');
  const W=120,H=75; c.width=W; c.height=H; ctx.clearRect(0,0,W,H);
  if(!branches.size) return;
  const bs=[...branches.values()];
  const x0=Math.min(...bs.map(b=>b.x))-20, y0=Math.min(...bs.map(b=>b.y))-20;
  const x1=Math.max(...bs.map(b=>b.x))+400, y1=Math.max(...bs.map(b=>b.y))+260;
  const sc=Math.min(W/(x1-x0),H/(y1-y0))*.88;
  const ox=(W-(x1-x0)*sc)/2-x0*sc, oy=(H-(y1-y0)*sc)/2-y0*sc;
  bs.forEach(b=>{ ctx.fillStyle='rgba(255,255,255,.9)'; ctx.strokeStyle='rgba(181,114,50,.4)'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(b.x*sc+ox,b.y*sc+oy,380*sc,55*sc,2); ctx.fill(); ctx.stroke(); });
  const r=wrap.getBoundingClientRect(); ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=1;
  ctx.strokeRect((-V.x/V.z)*sc+ox,(-V.y/V.z)*sc+oy,(r.width/V.z)*sc,(r.height/V.z)*sc);
}
let _tipTimer=null;
function showTip(msg,sticky=false){ const el=document.getElementById('wtip'); el.textContent=msg; el.classList.add('on'); clearTimeout(_tipTimer); if(!sticky) _tipTimer=setTimeout(()=>el.classList.remove('on'),2600); }
function hideTip(){ clearTimeout(_tipTimer); document.getElementById('wtip').classList.remove('on'); }

// ═══════════════════════════════════════════════
// SIDEBAR & CHAT MANAGEMENT
// ═══════════════════════════════════════════════
function formatDate(ts){
  const d=new Date(ts), now=new Date();
  if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

function renderSidebar(){
  const all=loadAllChats();
  const list=document.getElementById('sb-list');
  const ids=Object.keys(all).sort((a,b)=>(all[b].updatedAt||0)-(all[a].updatedAt||0));
  if(!ids.length){
    list.innerHTML='<div class="sb-empty">No saved chats yet.<br/>Start typing to begin.</div>';
    return;
  }
  list.innerHTML='';
  ids.forEach(id=>{
    const chat=all[id];
    const item=document.createElement('div');
    item.className='sb-item'+(id===currentChatId?' active':'');
    item.innerHTML=`
      <div class="sb-item-info">
        <div class="sb-item-name">${esc(chat.title||'Untitled chat')}</div>
        <div class="sb-item-date">${formatDate(chat.updatedAt||0)}</div>
      </div>
      <button class="sb-item-del" title="Delete chat">✕</button>`;
    item.querySelector('.sb-item-del').addEventListener('click',e=>{
      e.stopPropagation();
      if(!confirm('Delete this chat?')) return;
      deleteChatFromServer(id);
      delete _allChats[id];
      if(id===currentChatId){ const remaining=Object.keys(_allChats); remaining.length?loadChat(remaining[0]):newChat(); }
      else renderSidebar();
    });
    item.addEventListener('click',()=>{ if(id!==currentChatId) loadChat(id); });
    list.appendChild(item);
  });
}

// Clear current session from DOM & memory
function clearSession(){
  mainMsgs.length=0;
  branches.forEach(b=>b.el?.remove()); branches.clear();
  wires.length=0;
  _mid=1; _bid=1; _wid=1;
  document.getElementById('main-msgs').innerHTML='';
  document.getElementById('canvas').innerHTML='';
  document.getElementById('svg-layer').innerHTML='';
  document.getElementById('canvas-empty').style.display='flex';
  V.x=40; V.y=40; V.z=1;
}

function newChat(){
  saveCurrentChat();
  clearSession();
  currentChatId='chat_'+Date.now();
  saveActiveId(currentChatId);
  document.getElementById('chat-title').value='';
  _allChats[currentChatId]={id:currentChatId,title:'New chat',updatedAt:Date.now(),mainMsgs:[],branches:[],wires:[],counters:{mid:1,bid:1,wid:1},view:{x:40,y:40,z:1}};
  saveChatToServer(_allChats[currentChatId]);
  initMain(); applyV(); renderSidebar();
}

function loadChat(id){
  saveCurrentChat();
  const all=loadAllChats(); const chat=all[id]; if(!chat) return;
  clearSession();
  currentChatId=id;
  saveActiveId(id);
  document.getElementById('chat-title').value=chat.title||'';

  // restore counters
  if(chat.counters){ _mid=chat.counters.mid; _bid=chat.counters.bid; _wid=chat.counters.wid; }

  // restore view
  if(chat.view){ V.x=chat.view.x; V.y=chat.view.y; V.z=chat.view.z; }

  // restore main messages
  (chat.mainMsgs||[]).forEach(m=>mainMsgs.push({...m}));

  // restore branches
  (chat.branches||[]).forEach(bd=>{
    branches.set(bd.id,{id:bd.id,parentMsgId:bd.parentMsgId,parentBid:bd.parentBid||null,refMsgIds:[...(bd.refMsgIds||[])],msgs:[...(bd.msgs||[])],x:bd.x,y:bd.y,el:null});
  });

  // restore wires
  (chat.wires||[]).forEach(w=>wires.push({...w}));

  // render main messages
  const msgsEl=document.getElementById('main-msgs');
  pairMsgs(mainMsgs).forEach(({user,ai})=>{
    const el=makePairEl(user,ai,{onBranch:branchFromMain,wireDot:true});
    msgsEl.appendChild(el);
    // re-populate acts for done messages
    if(ai&&ai.status==='done'){
      const acts=document.getElementById('aa-'+ai.id);
      if(acts) populateActs(acts,ai.id,{onBranch:branchFromMain,wireDot:true});
    }
  });

  // render branches
  branches.forEach((_,bid)=>renderBranchCard(bid));
  if(branches.size) document.getElementById('canvas-empty').style.display='none';

  initMain(); applyV(); renderSidebar(); scrollMain();
}

// Chat title edit
document.getElementById('chat-title').addEventListener('input', scheduleSave);
document.getElementById('chat-title').addEventListener('keydown',e=>{ if(e.key==='Enter') e.target.blur(); });

// ═══════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════
document.getElementById('btn-fit').addEventListener('click',fitBranches);
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!branches.size) return;
  if(!confirm('Clear all branches?')) return;
  branches.forEach(b=>b.el?.remove()); branches.clear();
  wires.length=0; _bid=1; _wid=1;
  drawConnectors(); drawMinimap();
  document.getElementById('canvas-empty').style.display='flex';
  scheduleSave();
});
document.getElementById('btn-new-chat').addEventListener('click',newChat);

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
async function boot(){
  // Load chats from server for the logged-in user
  _allChats = await loadAllChatsFromServer();
  const lastId = loadActiveId();
  if(lastId && _allChats[lastId]){
    loadChat(lastId);
  } else {
    const ids = Object.keys(_allChats);
    if(ids.length){ loadChat(ids.sort((a,b)=>(_allChats[b].updatedAt||0)-(_allChats[a].updatedAt||0))[0]); }
    else{ newChat(); }
  }
}

// Try to restore PIN from localStorage on page load
(function init(){
  const saved = localStorage.getItem('pc_pin');
  if(saved && /^\d{4}$/.test(saved)){
    _pin = saved;
    document.getElementById('user-pin-label').textContent = 'PIN ••••';
    authOverlay.classList.add('hidden');
    boot();
    return;
  }
  authOverlay.classList.remove('hidden');
})();
</script>
